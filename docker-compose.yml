version: '3.8'
services:
  app:
    build: .
    ports:
      - "3000:80"
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/ecommerce
      - JWT_SECRET=your-jwt-secret-key-change-this-in-production
      - PORT=5000
      - NODE_ENV=production
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:5.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=ecommerce
    restart: unless-stopped

volumes:
  mongodb_data: