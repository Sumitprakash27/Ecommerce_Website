name: Deploy E-Commerce App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v3
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/ecommerce-app:latest
          ${{ secrets.DOCKER_USERNAME }}/ecommerce-app:${{ github.sha }}

    - name: Deploy to server (optional)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Add your deployment commands here"
        # Example: ssh to your server and pull the new image
        # ssh user@your-server.com "docker pull ${{ secrets.DOCKER_USERNAME }}/ecommerce-app:latest && docker-compose up -d"